<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mus</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cargamos la librería mágica para conectarnos -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="setup-screen" class="screen">
        <h1>🎴 Mus P2P</h1>
        <div class="panel">
            <h3>Soy el Host</h3>
            <button id="btn-create">Crear Partida</button>
            <p>Tu código para compartir es: <span id="my-id" class="highlight">...</span></p>
        </div>
        
        <div class="panel">
            <h3>Soy el Invitado</h3>
            <input type="text" id="join-id" placeholder="Introduce el código del Host">
            <button id="btn-join">Conectarse</button>
        </div>
        <p id="status-msg"></p>
    </div>

    <div id="game-screen" class="screen hidden">
            <div class="table">
                <div id="opponent-area" class="player-area">
                    <p>Rival - Puntos: <span id="puntos-rival" class="highlight">0</span>/40</p>
                    <p id="turno-rival" class="turno-indicador hidden">⚠️ El rival habla</p>
                    <div class="cards-placeholder">[Cartas del rival ocultas]</div>
                </div>
                
        <div class="center-area">
                <div id="betting-log" class="hidden">
                    <!-- Aquí aparecerá Grande: 2, Chica: 0, etc. -->
                </div>
                <p id="game-log">Esperando para repartir...</p>
                
                <div id="action-buttons" class="hidden">
                    <!-- Botones anteriores -->
                    <button id="btn-deal" class="hidden">Repartir Cartas</button>
                    <button id="btn-pedrete" class="hidden">¡Pedrete!</button>
                    <button id="btn-mus" class="hidden">Mus</button>
                    <button id="btn-nomus" class="hidden">No hay Mus</button>
                    <button id="btn-descartar" class="hidden">Descartar (0)</button>
                    <button id="btn-next-round" class="hidden">Siguiente ronda</button>

                    <!-- NUEVOS: Botones de Iniciar Apuesta -->
                    <div id="apuesta-iniciar" class="apuesta-grupo hidden">
                        <div class="apuesta-col">
                            <input type="number" id="in-envidar" value="2" min="1">
                            <button id="btn-envidar">Envidar</button>
                        </div>
                        <button id="btn-pasar">Pasar</button>
                        <button id="btn-ordago">Órdago</button>
                    </div>

                    <!-- NUEVOS: Botones de Responder Apuesta -->
                    <div id="apuesta-responder" class="apuesta-grupo hidden">
                        <button id="btn-ver">Ver</button>
                        <div class="apuesta-col">
                            <input type="number" id="in-subir" value="2" min="1">
                            <button id="btn-subir">Subir</button>
                        </div>
                        <button id="btn-nover">No ver</button>
                        <button id="btn-ordago-resp">Órdago</button>
                    </div>
                </div>
            </div>

                <div id="my-area" class="player-area">
                    <p id="mi-turno" class="turno-indicador hidden">⚠️ Tú hablas</p>
                    <p>Tú <span id="mi-rol" class="highlight"></span> - Puntos: <span id="puntos-mios" class="highlight">0</span>/40</p>
                    <div id="my-cards" class="cards-placeholder">Tus cartas aparecerán aquí</div>
                </div>
            </div>
        </div>
<div class="watermark">Created by Juan Martin Fajardo</div>

    <script src="app.js"></script>
</body>
</html>
